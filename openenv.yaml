name: cybershield-ai
tasks:
  - name: easy
    difficulty: easy
  - name: medium
    difficulty: medium
  - name: hard
    difficulty: hard

environment:
  observation_space:
    type: array
    shape: [3]   # matches your backend returning [0, 0, 0]

  action_space:
    type: discrete
    actions:
      - allow
      - block 
      - rate_limit

endpoints:
  reset:
    method: POST
    path: /reset

  step:
    method: POST
    path: /step

  state:
    method: GET
    path: /state